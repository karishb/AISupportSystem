name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Verify imports
        run: |
          python -c "from backend.config import DATABASE_URL; print('config OK')"
          python -c "from backend.models import Ticket, Insight; print('models OK')"
          python -c "from ai.classical import categorize, analyze_sentiment; print('classical AI OK')"
          python -c "from pipeline.clean import clean; print('pipeline OK')"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend && npm ci && npm run build

  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t support-insight-platform .
